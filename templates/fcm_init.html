{% load static %}
<style>
/* ── Notification Toast ─────────────────────────────────── */
#notif-toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  z-index: 999999;
  min-width: 280px;
  max-width: 90vw;
  padding: 14px 20px;
  border-radius: 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  font-weight: 500;
  text-align: center;
  box-shadow: 0 8px 30px rgba(0,0,0,0.35);
  transition: transform 0.4s cubic-bezier(.34,1.56,.64,1), opacity 0.3s ease;
  opacity: 0;
  pointer-events: none;
}
#notif-toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
  pointer-events: auto;
}
#notif-toast.success {
  background: linear-gradient(135deg, #1a3a2a, #1e5c38);
  color: #7dffb0;
  border: 1px solid #2a7a4a;
}
#notif-toast.error {
  background: linear-gradient(135deg, #3a1a1a, #5c1e1e);
  color: #ffaaaa;
  border: 1px solid #7a2a2a;
}
#notif-toast.info {
  background: linear-gradient(135deg, #1a2a3a, #1e3a5c);
  color: #aaddff;
  border: 1px solid #2a4a7a;
}
/* Enable bell button */
#notif-enable-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 99999;
  background: linear-gradient(135deg, #d4a852, #b8892e);
  color: #0d0f14;
  font-family: 'DM Sans', sans-serif;
  font-weight: 700;
  font-size: 0.85rem;
  border: none;
  padding: 13px 20px;
  border-radius: 30px;
  cursor: pointer;
  box-shadow: 0 6px 20px rgba(212,168,82,0.4);
  display: flex;
  align-items: center;
  gap: 8px;
  transition: transform 0.2s, opacity 0.3s;
}
#notif-enable-btn:hover { transform: scale(1.05); }
#notif-enable-btn:active { transform: scale(0.98); }
#notif-enable-btn.loading {
  opacity: 0.7;
  pointer-events: none;
}
</style>

<div id="notif-toast"></div>

<script>
// ── Helper: CSRF ─────────────────────────────────────────────────────────────
function getCookie(name) {
  let v = null;
  if (document.cookie) {
    for (const c of document.cookie.split(';')) {
      const t = c.trim();
      if (t.startsWith(name + '=')) { v = decodeURIComponent(t.slice(name.length + 1)); break; }
    }
  }
  return v;
}

// ── User-facing toast (replaces the debug box) ───────────────────────────────
function showNotifToast(msg, type = 'info', duration = 5000) {
  const toast = document.getElementById('notif-toast');
  if (!toast) return;
  toast.className = '';  // reset classes
  toast.textContent = msg;
  // Force reflow so transition fires properly
  void toast.offsetHeight;
  toast.classList.add(type, 'show');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => {
    toast.classList.remove('show');
  }, duration);
}

// ── Save FCM token to backend ────────────────────────────────────────────────
function saveFCMTokenToServer(token) {
  return fetch('/staff/save-fcm-token/', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
    credentials: 'same-origin',
    body: JSON.stringify({ token })
  }).then(r => r.json());
}

// ── Main FCM registration flow ───────────────────────────────────────────────
function requestFCMToken(onDone) {
  if (!window.isSecureContext) {
    showNotifToast('⚠️ Notifications require a secure (HTTPS) connection.', 'error');
    if (onDone) onDone(false);
    return;
  }
  if (!('Notification' in window)) {
    showNotifToast('⚠️ Your browser does not support push notifications.', 'error');
    if (onDone) onDone(false);
    return;
  }
  if (!('serviceWorker' in navigator)) {
    showNotifToast('⚠️ Service workers are not supported in this browser.', 'error');
    if (onDone) onDone(false);
    return;
  }

  showNotifToast('🔔 Requesting notification permission…', 'info', 15000);

  async function run() {
    try {
      // Step 1: Request permission
      let perm = Notification.permission;
      if (perm === 'default') {
        perm = await Notification.requestPermission();
      }

      if (perm !== 'granted') {
        // iOS/Android blocked by user
        showNotifToast(
          '🔕 Notifications blocked. To enable them, go to your phone Settings → ' +
          (/(iPhone|iPad|iPod)/.test(navigator.userAgent) ? 'Safari → Notifications' : 'App → Notifications') +
          ' and allow for this site.',
          'error', 10000
        );
        if (onDone) onDone(false);
        return;
      }

      showNotifToast('⚙️ Setting up push service…', 'info', 15000);

      // Step 2: Wait for Service Worker
      let registration;
      try {
        registration = await Promise.race([
          navigator.serviceWorker.ready,
          new Promise((_, reject) => setTimeout(() => reject(new Error('SW timeout')), 10000))
        ]);
      } catch (e) {
        showNotifToast('❌ Push setup failed: Service worker not ready. Please reload and try again.', 'error', 8000);
        if (onDone) onDone(false);
        return;
      }

      // Step 3: Get Firebase token
      if (!window.firebase || !window.firebase.messaging) {
        showNotifToast('❌ Push service failed to load. Check your internet connection.', 'error', 8000);
        if (onDone) onDone(false);
        return;
      }

      if (!firebase.apps.length) {
        firebase.initializeApp({
          apiKey: "AIzaSyD7qnoyAyG2nU3DZOLGy2kkDkQB3FEwvqQ",
          authDomain: "mastan-761bc.firebaseapp.com",
          projectId: "mastan-761bc",
          storageBucket: "mastan-761bc.firebasestorage.app",
          messagingSenderId: "227009036928",
          appId: "1:227009036928:web:fedebf08a23e04442e1c65",
        });
      }

      let token;
      try {
        const msg = firebase.messaging();
        token = await msg.getToken({
          vapidKey: "BGgRyomQ2W4ZXkbOwiQfGQNVMdEqc3jf5rr3YLzTrpzZIw_ifF-Af0cZXc8nTJmX2OfAfM7dWpFNZM_9_NM4EHI",
          serviceWorkerRegistration: registration
        });
      } catch (e) {
        // Common Firebase errors
        let msg = '❌ Could not get push token.';
        if (e.message && e.message.includes('permission')) {
          msg = '🔕 Push permission was denied. Please enable notifications in Settings.';
        } else if (e.message && e.message.includes('network')) {
          msg = '❌ Network error. Please check your connection and try again.';
        }
        showNotifToast(msg, 'error', 8000);
        if (onDone) onDone(false);
        return;
      }

      if (!token) {
        showNotifToast('❌ Push registration failed. Please try again later.', 'error', 8000);
        if (onDone) onDone(false);
        return;
      }

      // Step 4: Save to server
      try {
        const data = await saveFCMTokenToServer(token);
        if (data.status === 'success') {
          showNotifToast('✅ Notifications enabled! You will receive alerts for new events.', 'success', 7000);
          if (onDone) onDone(true);
        } else {
          showNotifToast('⚠️ Notification setup partly failed: ' + (data.message || 'Server error.'), 'error', 8000);
          if (onDone) onDone(false);
        }
      } catch (e) {
        showNotifToast('⚠️ Could not save device registration. Please try again.', 'error', 8000);
        if (onDone) onDone(false);
      }
    } catch (err) {
      showNotifToast('❌ Unexpected error: ' + (err.message || err), 'error', 8000);
      if (onDone) onDone(false);
    }
  }

  run();
}

// ── Boot: show button or auto-register ──────────────────────────────────────
(function bootFCM() {
  if (!window.isSecureContext || !('Notification' in window)) return;

  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;

  if (Notification.permission === 'granted') {
    // Already allowed — silently re-register token in background (no UI)
    const doSilent = () => {
      navigator.serviceWorker.ready.then(reg => {
        if (!window.firebase || !window.firebase.messaging) return;
        try {
          if (!firebase.apps.length) {
            firebase.initializeApp({
              apiKey: "AIzaSyD7qnoyAyG2nU3DZOLGy2kkDkQB3FEwvqQ",
              authDomain: "mastan-761bc.firebaseapp.com",
              projectId: "mastan-761bc",
              storageBucket: "mastan-761bc.firebasestorage.app",
              messagingSenderId: "227009036928",
              appId: "1:227009036928:web:fedebf08a23e04442e1c65",
            });
          }
          firebase.messaging().getToken({
            vapidKey: "BGgRyomQ2W4ZXkbOwiQfGQNVMdEqc3jf5rr3YLzTrpzZIw_ifF-Af0cZXc8nTJmX2OfAfM7dWpFNZM_9_NM4EHI",
            serviceWorkerRegistration: reg
          }).then(token => {
            if (token) saveFCMTokenToServer(token).catch(() => {});
          }).catch(() => {});
        } catch(e) {}
      }).catch(() => {});
    };
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => setTimeout(doSilent, 1500));
    } else {
      setTimeout(doSilent, 1500);
    }

  } else if (Notification.permission === 'default') {
    // Show the enable button ONLY if they are running the installed PWA
    if (!isStandalone) {
      if (window._deferredInstallPrompt) {
        showInstallBtn();
      } else {
        window.addEventListener('beforeinstallprompt', (e) => {
          e.preventDefault();
          window._deferredInstallPrompt = e;
          showInstallBtn();
        });
      }
      return;
    }

    const showBtn = () => {
      if (document.getElementById('notif-enable-btn')) return;
      const btn = document.createElement('button');
      btn.id = 'notif-enable-btn';
      btn.innerHTML = '🔔 Enable Notifications';
      btn.onclick = () => {
        btn.classList.add('loading');
        btn.innerHTML = '⏳ Setting up…';
        requestFCMToken((success) => {
          btn.style.transition = 'opacity 0.4s';
          btn.style.opacity = '0';
          setTimeout(() => btn.remove(), 400);
        });
      };
      document.body.appendChild(btn);
    };
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', showBtn);
    else showBtn();

  }

  } else if (Notification.permission === 'denied') {
    if (!isStandalone) return;

    const showBtn = () => {
      const btn = document.createElement('button');
      btn.id = 'notif-enable-btn';
      btn.innerHTML = '⚙️ Unblock Notifications';
      btn.style.background = 'linear-gradient(135deg, #a53b3b, #8a2b2b)';
      btn.style.boxShadow = '0 6px 20px rgba(165,59,59,0.4)';
      btn.style.color = '#fff';
      
      btn.onclick = () => {
        showNotifToast('🔕 Notifications are blocked! Please open your phone Settings -> Apps and Allow notifications for this App, then restart it.', 'error', 12000);
      };
      document.body.appendChild(btn);
    };
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', showBtn);
    else showBtn();
  }

  function showInstallBtn() {
    if (document.getElementById('pwa-install-btn') || isStandalone) return;
    
    // Create professional install button
    const btn = document.createElement('button');
    btn.id = 'pwa-install-btn';
    btn.innerHTML = '📱 Install App';
    
    // Style mimicking the notification button but distinct
    btn.style.position = 'fixed';
    btn.style.bottom = '20px';
    btn.style.right = '20px';
    btn.style.zIndex = '99999';
    btn.style.background = 'linear-gradient(135deg, #2a4a7a, #1e3a5c)';
    btn.style.color = '#fff';
    btn.style.fontFamily = "'DM Sans', sans-serif";
    btn.style.fontWeight = '700';
    btn.style.fontSize = '0.85rem';
    btn.style.border = 'none';
    btn.style.padding = '13px 20px';
    btn.style.borderRadius = '30px';
    btn.style.cursor = 'pointer';
    btn.style.boxShadow = '0 6px 20px rgba(42, 74, 122, 0.4)';
    btn.style.display = 'flex';
    btn.style.alignItems = 'center';
    btn.style.gap = '8px';
    btn.style.transition = 'transform 0.2s, opacity 0.3s';
    
    btn.onmouseover = () => btn.style.transform = 'scale(1.05)';
    btn.onmouseout = () => btn.style.transform = 'scale(1)';
    
    btn.onclick = async () => {
      const promptEvent = window._deferredInstallPrompt;
      if (!promptEvent) return;
      
      btn.innerHTML = '⏳ Installing…';
      promptEvent.prompt();
      const { outcome } = await promptEvent.userChoice;
      if (outcome === 'accepted') {
        btn.style.opacity = '0';
        setTimeout(() => btn.remove(), 400);
        showNotifToast('✅ App installed! Please open it from your Home Screen to enable notifications.', 'success', 8000);
      } else {
        btn.innerHTML = '📱 Install App';
      }
      window._deferredInstallPrompt = null;
    };
    
    document.body.appendChild(btn);
  }
})();
</script>

<!-- Firebase SDK -->
<script defer src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script defer src="https://www.gstatic.com/firebasejs/9.23.0/firebase-messaging-compat.js"></script>
<script>
window.addEventListener('load', () => {
  if (navigator.clearAppBadge) {
    navigator.clearAppBadge().catch(()=>{});
  }
  
  setTimeout(() => {
    try {
      if (typeof firebase === 'undefined') return;
      const firebaseConfig = {
        apiKey: "AIzaSyD7qnoyAyG2nU3DZOLGy2kkDkQB3FEwvqQ",
        authDomain: "mastan-761bc.firebaseapp.com",
        projectId: "mastan-761bc",
        storageBucket: "mastan-761bc.firebasestorage.app",
        messagingSenderId: "227009036928",
        appId: "1:227009036928:web:fedebf08a23e04442e1c65",
      };
      if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }

      const messaging = firebase.messaging();

      // Handle foreground (in-app) notifications
      messaging.onMessage((payload) => {
        if (navigator.setAppBadge) {
          navigator.setAppBadge(1).catch(()=>{});
        }
        const data = payload.data || {};
        const notif = payload.notification || {};
        const title = data.title || notif.title || 'Notification';
        const body  = data.body  || notif.body  || '';
        const icon  = data.icon  || notif.icon  || '/static/icons/icon-192x192.png';

        // Show as a native notification via SW
        navigator.serviceWorker && navigator.serviceWorker.ready.then(reg => {
          reg.showNotification(title, { body, icon });
        });
        // Also show in-app toast
        if (typeof showNotifToast === 'function') { showNotifToast('📢 ' + title + ': ' + body, 'info'); }
      });
    } catch(e) {
      console.warn('[FCM] Firebase SDK init failed:', e.message);
    }
  }, 1000); // 1-second delay so it never blocks UI interactions after load
});
</script>
