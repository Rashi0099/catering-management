<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js"></script>
<script>
  // Initialize Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyD7qnoyAyG2nU3DZOLGy2kkDkQB3FEwvqQ",
    authDomain: "mastan-761bc.firebaseapp.com",
    projectId: "mastan-761bc",
    storageBucket: "mastan-761bc.firebasestorage.app",
    messagingSenderId: "227009036928",
    appId: "1:227009036928:web:fedebf08a23e04442e1c65",
  };
  
  if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
  }

  const messaging = firebase.messaging();

  // Function to register token
  function requestFCMToken() {
    Notification.requestPermission().then((permission) => {
      if (permission === 'granted') {
        navigator.serviceWorker.ready.then((registration) => {
          messaging.getToken({ 
            vapidKey: "BGgRyomQ2W4ZXkbOwiQfGQNVMdEqc3jf5rr3YLzTrpzZIw_ifF-Af0cZXc8nTJmX2OfAfM7dWpFNZM_9_NM4EHI",
            serviceWorkerRegistration: registration
          })
            .then((currentToken) => {
              if (currentToken) {
                  // Send the token to the server
                  fetch('/staff/save-fcm-token/', {
                      method: 'POST',
                      headers: {
                          'Content-Type': 'application/json',
                          'X-CSRFToken': getCookie('csrftoken')
                      },
                      body: JSON.stringify({token: currentToken})
                  }).then(response => {
                      console.log('FCM Token successfully synced to server');
                  }).catch(err => {
                      console.error('Failed to sync FCM Token:', err);
                  });
              } else {
                console.log('No FCM registration token available. Request permission to generate one.');
              }
            }).catch((err) => {
              console.log('An error occurred while retrieving token. ', err);
            });
        });
      } else {
        console.log('Unable to get permission to notify.');
      }
    });
  }

  // Helper to get CSRF token
  function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
  }

  // Only request if logged in and in secure context or localhost
  if (window.isSecureContext && 'Notification' in window) {
      if (Notification.permission === 'granted') {
          if (document.readyState === "loading") {
              document.addEventListener("DOMContentLoaded", requestFCMToken);
          } else {
              requestFCMToken();
          }
      } else if (Notification.permission === 'default') {
          const showFCMButton = () => {
             const btn = document.createElement('button');
             btn.innerHTML = '🔔 Enable Notifications';
             btn.style.cssText = 'position:fixed; bottom:20px; right:20px; z-index:99999; background:#d4a852; color:#0d0f14; font-family:"DM Sans",sans-serif; font-weight:600; font-size:0.85rem; border:none; padding:12px 20px; border-radius:30px; cursor:pointer; box-shadow:0 8px 20px rgba(0,0,0,0.4); display:flex; align-items:center; gap:8px; transition:all 0.2s;';
             btn.onmouseover = () => btn.style.transform = 'translateY(-2px)';
             btn.onmouseout = () => btn.style.transform = 'translateY(0)';
             btn.onclick = () => {
                 requestFCMToken();
                 btn.style.opacity = '0';
                 setTimeout(() => btn.remove(), 300);
             };
             document.body.appendChild(btn);
          };

          if (document.readyState === "loading") {
              document.addEventListener("DOMContentLoaded", showFCMButton);
          } else {
              showFCMButton();
          }
      }
  }

  // Handle incoming messages when the app is in focus
  messaging.onMessage((payload) => {
    console.log('Message received. ', payload);
    
    const title = payload.data?.title || payload.notification?.title || 'Notification';
    const body = payload.data?.body || payload.notification?.body || '';
    const icon = payload.data?.icon || payload.notification?.icon || '/static/icons/icon-192x192_white.png';
    
    // Web custom toast if exists
    if (typeof showToast === "function") {
        showToast("📢 " + title + ": " + body);
    }
    
    // Explicitly show OS notification since PWA foreground may not auto-display it
    const options = {
        body: body,
        icon: icon
    };
    
    if (navigator.serviceWorker) {
        navigator.serviceWorker.ready.then((reg) => {
            reg.showNotification(title, options);
        });
    } else {
        new Notification(title, options);
    }
  });

</script>
