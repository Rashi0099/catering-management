{% load static %}
<style>
/* ── Notification Toast ─────────────────────────────────── */
#notif-toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  z-index: 999999;
  min-width: 280px;
  max-width: 90vw;
  padding: 14px 20px;
  border-radius: 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  font-weight: 500;
  text-align: center;
  box-shadow: 0 8px 30px rgba(0,0,0,0.35);
  transition: transform 0.4s cubic-bezier(.34,1.56,.64,1), opacity 0.3s ease;
  opacity: 0;
  pointer-events: none;
}
#notif-toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
  pointer-events: auto;
}
#notif-toast.success {
  background: linear-gradient(135deg, #1a3a2a, #1e5c38);
  color: #7dffb0;
  border: 1px solid #2a7a4a;
}
#notif-toast.error {
  background: linear-gradient(135deg, #3a1a1a, #5c1e1e);
  color: #ffaaaa;
  border: 1px solid #7a2a2a;
}
#notif-toast.info {
  background: linear-gradient(135deg, #1a2a3a, #1e3a5c);
  color: #aaddff;
  border: 1px solid #2a4a7a;
}
/* Enable bell button */
#notif-enable-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 99999;
  background: linear-gradient(135deg, #d4a852, #b8892e);
  color: #0d0f14;
  font-family: 'DM Sans', sans-serif;
  font-weight: 700;
  font-size: 0.85rem;
  border: none;
  padding: 13px 20px;
  border-radius: 30px;
  cursor: pointer;
  box-shadow: 0 6px 20px rgba(212,168,82,0.4);
  display: flex;
  align-items: center;
  gap: 8px;
  transition: transform 0.2s, opacity 0.3s;
}
#notif-enable-btn:hover { transform: scale(1.05); }
#notif-enable-btn:active { transform: scale(0.98); }
#notif-enable-btn.loading {
  opacity: 0.7;
  pointer-events: none;
}
</style>

<div id="notif-toast"></div>

<script>
// ── Helper: CSRF ─────────────────────────────────────────────────────────────
function getCookie(name) {
  let v = null;
  if (document.cookie) {
    for (const c of document.cookie.split(';')) {
      const t = c.trim();
      if (t.startsWith(name + '=')) { v = decodeURIComponent(t.slice(name.length + 1)); break; }
    }
  }
  return v;
}

// ── User-facing toast (replaces the debug box) ───────────────────────────────
function showNotifToast(msg, type = 'info', duration = 5000) {
  const toast = document.getElementById('notif-toast');
  if (!toast) return;
  toast.className = '';  // reset classes
  toast.textContent = msg;
  // Force reflow so transition fires properly
  void toast.offsetHeight;
  toast.classList.add(type, 'show');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => {
    toast.classList.remove('show');
  }, duration);
}

// ── Save FCM token to backend ────────────────────────────────────────────────
function saveFCMTokenToServer(token) {
  return fetch('/staff/save-fcm-token/', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
    credentials: 'same-origin',
    body: JSON.stringify({ token })
  }).then(r => r.json());
}

// ── Main FCM registration flow ───────────────────────────────────────────────
function requestFCMToken(onDone) {
  if (!window.isSecureContext) {
    showNotifToast('⚠️ Notifications require a secure (HTTPS) connection.', 'error');
    if (onDone) onDone(false);
    return;
  }
  if (!('Notification' in window)) {
    showNotifToast('⚠️ Your browser does not support push notifications.', 'error');
    if (onDone) onDone(false);
    return;
  }
  if (!('serviceWorker' in navigator)) {
    showNotifToast('⚠️ Service workers are not supported in this browser.', 'error');
    if (onDone) onDone(false);
    return;
  }

  showNotifToast('🔔 Requesting notification permission…', 'info', 15000);

  async function run() {
    try {
      // Step 1: Request permission
      let perm = Notification.permission;
      if (perm === 'default') {
        perm = await Notification.requestPermission();
      }

      if (perm !== 'granted') {
        // iOS/Android blocked by user
        showNotifToast(
          '🔕 Notifications blocked. To enable them, go to your phone Settings → ' +
          (/(iPhone|iPad|iPod)/.test(navigator.userAgent) ? 'Safari → Notifications' : 'App → Notifications') +
          ' and allow for this site.',
          'error', 10000
        );
        if (onDone) onDone(false);
        return;
      }

      showNotifToast('⚙️ Setting up push service…', 'info', 15000);

      // Step 2: Wait for Service Worker
      let registration;
      try {
        registration = await Promise.race([
          navigator.serviceWorker.ready,
          new Promise((_, reject) => setTimeout(() => reject(new Error('SW timeout')), 10000))
        ]);
      } catch (e) {
        showNotifToast('❌ Push setup failed: Service worker not ready. Please reload and try again.', 'error', 8000);
        if (onDone) onDone(false);
        return;
      }

      // Step 3: Get Firebase token
      if (!window.firebase || !window.firebase.messaging) {
        showNotifToast('❌ Push service failed to load. Check your internet connection.', 'error', 8000);
        if (onDone) onDone(false);
        return;
      }

      if (!firebase.apps.length) {
        firebase.initializeApp({
          apiKey: "AIzaSyD7qnoyAyG2nU3DZOLGy2kkDkQB3FEwvqQ",
          authDomain: "mastan-761bc.firebaseapp.com",
          projectId: "mastan-761bc",
          storageBucket: "mastan-761bc.firebasestorage.app",
          messagingSenderId: "227009036928",
          appId: "1:227009036928:web:fedebf08a23e04442e1c65",
        });
      }

      let token;
      try {
        const msg = firebase.messaging();
        token = await msg.getToken({
          vapidKey: "BGgRyomQ2W4ZXkbOwiQfGQNVMdEqc3jf5rr3YLzTrpzZIw_ifF-Af0cZXc8nTJmX2OfAfM7dWpFNZM_9_NM4EHI",
          serviceWorkerRegistration: registration
        });
      } catch (e) {
        // Map Firebase errors to clear, user-friendly messages
        let msg = '❌ Push setup failed.';
        const err = (e.message || e.code || '').toLowerCase();
        if (err.includes('permission') || err.includes('denied')) {
          msg = '🔕 Notifications blocked — go to phone Settings → Chrome / Site → Allow Notifications, then retry.';
        } else if (err.includes('network') || err.includes('fetch') || err.includes('offline')) {
          msg = '📶 No internet — check your connection and try again.';
        } else if (err.includes('service-worker') || err.includes('serviceworker') || err.includes('sw')) {
          msg = '⚙️ Service worker issue — please reload the page and try again.';
        } else if (err.includes('vapid') || err.includes('key')) {
          msg = '🔑 Push key error — please contact the administrator.';
        } else if (err.includes('not-registered') || err.includes('registration')) {
          msg = '📵 This device is not registered for push. Tap Retry to re-register.';
        } else if (err.includes('localhost') || err.includes('127.0.0') || !window.isSecureContext) {
          msg = '🔒 Notifications only work on the live site (HTTPS), not on localhost.';
        } else if (err) {
          msg = '❌ Setup failed: ' + (e.message || 'Unknown error. Try reloading.');
        }
        localStorage.setItem('fcm_status', 'error');
        localStorage.setItem('fcm_message', msg);
        document.dispatchEvent(new CustomEvent('fcmStatus', {detail: 'error'}));
        showNotifToast(msg, 'error', 8000);
        if (onDone) onDone(false);
        return;
      }

      if (!token) {
        localStorage.setItem('fcm_status', 'error');
        localStorage.setItem('fcm_message', '❌ Push registration failed. No token generated.');
        document.dispatchEvent(new CustomEvent('fcmStatus', {detail: 'error'}));
        showNotifToast('❌ Push registration failed. Please try again later.', 'error', 8000);
        if (onDone) onDone(false);
        return;
      }

      // Step 4: Save to server
      try {
        const data = await saveFCMTokenToServer(token);
        if (data.status === 'success') {
          localStorage.setItem('fcm_status', 'active');
          localStorage.removeItem('fcm_message');
          document.dispatchEvent(new CustomEvent('fcmStatus', {detail: 'active'}));
          showNotifToast('✅ Notifications enabled! You will receive alerts for new events.', 'success', 7000);
          if (onDone) onDone(true);
        } else {
          const errMsg = '⚠️ Notification setup partly failed: ' + (data.message || 'Server error.');
          localStorage.setItem('fcm_status', 'error');
          localStorage.setItem('fcm_message', errMsg);
          document.dispatchEvent(new CustomEvent('fcmStatus', {detail: 'error'}));
          showNotifToast(errMsg, 'error', 8000);
          if (onDone) onDone(false);
        }
      } catch (e) {
        localStorage.setItem('fcm_status', 'error');
        localStorage.setItem('fcm_message', '⚠️ Could not save device registration.');
        document.dispatchEvent(new CustomEvent('fcmStatus', {detail: 'error'}));
        showNotifToast('⚠️ Could not save device registration. Please try again.', 'error', 8000);
        if (onDone) onDone(false);
      }
    } catch (err) {
      localStorage.setItem('fcm_status', 'error');
      localStorage.setItem('fcm_message', '❌ Unexpected error.');
      document.dispatchEvent(new CustomEvent('fcmStatus', {detail: 'error'}));
      showNotifToast('❌ Unexpected error: ' + (err.message || err), 'error', 8000);
      if (onDone) onDone(false);
    }
  }

  run();
}

// ── Boot: show button or auto-register ──────────────────────────────────────
(function bootFCM() {
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  
  if (!window.isSecureContext) return;
  if (!('Notification' in window)) {
    // On iOS 16.4+, Apple hides the Web Push Notification API unless the app is added to the home screen.
    // If we're on iOS and not standalone, show the custom "Add to Home Screen" instructions.
    if (isIOS && !window.navigator.standalone) {
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', showIOSInstallInstruction);
      } else {
        showIOSInstallInstruction();
      }
    }
    return;
  }

  function showIOSInstallInstruction() {
    if (document.getElementById('ios-install-toast')) return;
    const toast = document.createElement('div');
    toast.id = 'ios-install-toast';
    toast.innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <div>
          <strong style="display:block;margin-bottom:4px">📱 Install App on iPhone</strong>
          <span style="font-size:0.8rem;opacity:0.9">To receive notifications, tap the Share icon <b><i class="fas fa-external-link-alt" style="transform: rotate(-90deg); margin:0 3px;"></i></b> below and select "<b>Add to Home Screen</b>".</span>
        </div>
        <button onclick="this.parentElement.parentElement.remove()" style="background:none;border:none;color:#fff;font-size:1.5rem;margin-left:14px;cursor:pointer;padding:0 5px;">&times;</button>
      </div>
    `;
    toast.style.position = 'fixed';
    toast.style.bottom = '20px';
    toast.style.left = '50%';
    toast.style.transform = 'translateX(-50%)';
    toast.style.width = 'calc(100% - 40px)';
    toast.style.maxWidth = '400px';
    toast.style.background = 'linear-gradient(135deg, #2a4a7a, #1e3a5c)';
    toast.style.color = '#fff';
    toast.style.padding = '16px';
    toast.style.borderRadius = '12px';
    toast.style.boxShadow = '0 10px 30px rgba(0,0,0,0.5)';
    toast.style.zIndex = '999999';
    toast.style.fontFamily = "'DM Sans', sans-serif";
    document.body.appendChild(toast);
  }

  const isStandalone = window.matchMedia('(display-mode: standalone)').matches
    || window.matchMedia('(display-mode: minimal-ui)').matches
    || window.navigator.standalone === true
    || document.referrer.startsWith('android-app://');

  if (Notification.permission === 'granted') {
    // Already allowed — silently re-register token in background (no UI)
    const doSilent = () => {
      navigator.serviceWorker.ready.then(reg => {
        if (!window.firebase || !window.firebase.messaging) return;
        try {
          if (!firebase.apps.length) {
            firebase.initializeApp({
              apiKey: "AIzaSyD7qnoyAyG2nU3DZOLGy2kkDkQB3FEwvqQ",
              authDomain: "mastan-761bc.firebaseapp.com",
              projectId: "mastan-761bc",
              storageBucket: "mastan-761bc.firebasestorage.app",
              messagingSenderId: "227009036928",
              appId: "1:227009036928:web:fedebf08a23e04442e1c65",
            });
          }
          firebase.messaging().getToken({
            vapidKey: "BGgRyomQ2W4ZXkbOwiQfGQNVMdEqc3jf5rr3YLzTrpzZIw_ifF-Af0cZXc8nTJmX2OfAfM7dWpFNZM_9_NM4EHI",
            serviceWorkerRegistration: reg
          }).then(token => {
            if (token) {
              saveFCMTokenToServer(token).then(data => {
                if (data.status === 'success') {
                  localStorage.setItem('fcm_status', 'active');
                  localStorage.removeItem('fcm_message');
                  document.dispatchEvent(new CustomEvent('fcmStatus', {detail: 'active'}));
                } else {
                  localStorage.setItem('fcm_status', 'error');
                  localStorage.setItem('fcm_message', '❌ Setup failed: ' + (data.message || 'Server error'));
                  document.dispatchEvent(new CustomEvent('fcmStatus', {detail: 'error'}));
                }
              }).catch(() => {
                localStorage.setItem('fcm_status', 'error');
                localStorage.setItem('fcm_message', '❌ Server error saving token.');
                document.dispatchEvent(new CustomEvent('fcmStatus', {detail: 'error'}));
              });
            } else {
               localStorage.setItem('fcm_status', 'error');
               localStorage.setItem('fcm_message', '❌ Push sync failed.');
               document.dispatchEvent(new CustomEvent('fcmStatus', {detail: 'error'}));
            }
          }).catch(e => {
            localStorage.setItem('fcm_status', 'error');
            localStorage.setItem('fcm_message', '❌ Background token error.');
            document.dispatchEvent(new CustomEvent('fcmStatus', {detail: 'error'}));
          });
        } catch(e) {
          localStorage.setItem('fcm_status', 'error');
          localStorage.setItem('fcm_message', '❌ Push SDK failed.');
          document.dispatchEvent(new CustomEvent('fcmStatus', {detail: 'error'}));
        }
      }).catch(() => {});
    };
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => setTimeout(doSilent, 1500));
    } else {
      setTimeout(doSilent, 1500);
    }

  } else if (Notification.permission === 'default') {
    if (!isStandalone) {
      // If browser supports install prompt, show it
      if (window._deferredInstallPrompt) {
        showInstallBtn();
        return;
      }
      // Listen for the prompt — if it fires, show Install button
      let promptFired = false;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window._deferredInstallPrompt = e;
        promptFired = true;
        // Remove the Enable button if it appeared, show Install instead
        const existing = document.getElementById('notif-enable-btn');
        if (existing) existing.remove();
        showInstallBtn();
      });
      // Wait 2s — if no install prompt fires, show Enable Notifications anyway
      // (handles: app already installed but opened in browser, or unsupported browser)
      setTimeout(() => {
        if (!promptFired && !isStandalone) {
          showEnableBtn();
        }
      }, 2000);
      return;
    }
    // Standalone mode — show Enable Notifications button safely after DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', showEnableBtn);
    } else {
      showEnableBtn();
    }

    function showEnableBtn() {
      if (document.getElementById('notif-enable-btn')) return;
      if (!document.body) { setTimeout(showEnableBtn, 300); return; }
      const btn = document.createElement('button');
      btn.id = 'notif-enable-btn';
      btn.innerHTML = '🔔 Enable Notifications';
      btn.onclick = () => {
        btn.classList.add('loading');
        btn.innerHTML = '⏳ Setting up…';
        requestFCMToken((success) => {
          btn.style.transition = 'opacity 0.4s';
          btn.style.opacity = '0';
          setTimeout(() => btn.remove(), 400);
        });
      };
      document.body.appendChild(btn);
    }

  } else if (Notification.permission === 'denied') {
    // Show Unblock button in BOTH browser and standalone mode
    const showBtn = () => {
      const btn = document.createElement('button');
      btn.id = 'notif-enable-btn';
      btn.innerHTML = '⚙️ Unblock Notifications';
      btn.style.background = 'linear-gradient(135deg, #a53b3b, #8a2b2b)';
      btn.style.boxShadow = '0 6px 20px rgba(165,59,59,0.4)';
      btn.style.color = '#fff';
      
      btn.onclick = () => {
        showNotifToast('Notifications are blocked! Please open your phone Settings -> Apps and Allow notifications for this App, then restart it.', 'error', 12000);
      };
      document.body.appendChild(btn);
    };
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', showBtn);
    else showBtn();
  }

  function showInstallBtn() {
    if (document.getElementById('pwa-install-btn') || isStandalone) return;
    
    // Create professional install button
    const btn = document.createElement('button');
    btn.id = 'pwa-install-btn';
    btn.innerHTML = '📱 Install App';
    
    // Style mimicking the notification button but distinct
    btn.style.position = 'fixed';
    btn.style.bottom = '20px';
    btn.style.right = '20px';
    btn.style.zIndex = '99999';
    btn.style.background = 'linear-gradient(135deg, #2a4a7a, #1e3a5c)';
    btn.style.color = '#fff';
    btn.style.fontFamily = "'DM Sans', sans-serif";
    btn.style.fontWeight = '700';
    btn.style.fontSize = '0.85rem';
    btn.style.border = 'none';
    btn.style.padding = '13px 20px';
    btn.style.borderRadius = '30px';
    btn.style.cursor = 'pointer';
    btn.style.boxShadow = '0 6px 20px rgba(42, 74, 122, 0.4)';
    btn.style.display = 'flex';
    btn.style.alignItems = 'center';
    btn.style.gap = '8px';
    btn.style.transition = 'transform 0.2s, opacity 0.3s';
    
    btn.onmouseover = () => btn.style.transform = 'scale(1.05)';
    btn.onmouseout = () => btn.style.transform = 'scale(1)';
    
    btn.onclick = async () => {
      const promptEvent = window._deferredInstallPrompt;
      if (!promptEvent) return;
      
      btn.innerHTML = '⏳ Installing…';
      promptEvent.prompt();
      const { outcome } = await promptEvent.userChoice;
      if (outcome === 'accepted') {
        btn.style.opacity = '0';
        setTimeout(() => btn.remove(), 400);
        showNotifToast('✅ App installed! Please open it from your Home Screen to enable notifications.', 'success', 8000);
      } else {
        btn.innerHTML = '📱 Install App';
      }
      window._deferredInstallPrompt = null;
    };
    
    document.body.appendChild(btn);
  }
})();
</script>

<script defer src="https://www.gstatic.com/firebasejs/9.23.0/firebase-messaging-compat.js"></script>
<script>
window.addEventListener('load', () => {
  if (navigator.clearAppBadge) {
    navigator.clearAppBadge().catch(()=>{});
  }
  
  setTimeout(() => {
    try {
      if (typeof firebase === 'undefined') return;
      const firebaseConfig = {
        apiKey: "AIzaSyD7qnoyAyG2nU3DZOLGy2kkDkQB3FEwvqQ",
        authDomain: "mastan-761bc.firebaseapp.com",
        projectId: "mastan-761bc",
        storageBucket: "mastan-761bc.firebasestorage.app",
        messagingSenderId: "227009036928",
        appId: "1:227009036928:web:fedebf08a23e04442e1c65",
      };
      if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }

      const messaging = firebase.messaging();

      // Handle foreground (in-app) notifications
      messaging.onMessage((payload) => {
        if (navigator.setAppBadge) {
          navigator.setAppBadge(1).catch(()=>{});
        }
        const data = payload.data || {};
        const notif = payload.notification || {};
        const title = data.title || notif.title || 'Notification';
        const body  = data.body  || notif.body  || '';
        const icon  = data.icon  || notif.icon  || '/static/icons/icon-192x192.png';

        // Show as a native notification via SW
        navigator.serviceWorker && navigator.serviceWorker.ready.then(reg => {
          reg.showNotification(title, { body, icon });
        });
        // Also show in-app toast
        if (typeof showNotifToast === 'function') { showNotifToast('📢 ' + title + ': ' + body, 'info'); }
      });
    } catch(e) {
      console.warn('[FCM] Firebase SDK init failed:', e.message);
    }
  }, 1000); // 1-second delay so it never blocks UI interactions after load
});
</script>
