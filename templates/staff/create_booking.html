{% extends 'staff/base.html' %}
{% block title %}New Booking{% endblock %}
{% block nav_new %}active{% endblock %}
{% block page_title %}Create New Booking{% endblock %}

{% block content %}
<div style="max-width:700px">
  <div class="panel">
    <form method="post">
      {% csrf_token %}

      <div style="font-family:'Playfair Display',serif;font-size:1rem;color:var(--teal);margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid var(--border)">
        Client Information
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" name="name" required placeholder="Client's full name"/>
        </div>
        <div class="form-group">
          <label>Phone *</label>
          <input type="tel" name="phone" required placeholder="+91 9744067400"/>
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input type="email" name="email" required placeholder="client@email.com"/>
        </div>
        <div class="form-group">
          <label>Company</label>
          <input type="text" name="company" placeholder="Optional"/>
        </div>
      </div>

      <div style="font-family:'Playfair Display',serif;font-size:1rem;color:var(--teal);margin:22px 0 16px;padding-bottom:10px;border-bottom:1px solid var(--border)">
        Event Details
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Event Type *</label>
          <select name="event_type" required>
            <option value="">Select...</option>
            <option value="wedding">💒 Wedding</option>
            <option value="corporate">🏢 Corporate</option>
            <option value="birthday">🎂 Birthday</option>
            <option value="anniversary">💑 Anniversary</option>
            <option value="graduation">🎓 Graduation</option>
            <option value="conference">📊 Conference</option>
            <option value="other">✨ Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>No. of Guests *</label>
          <input type="number" name="guest_count" required min="1" placeholder="e.g. 100"/>
        </div>
        <div class="form-group">
          <label>Event Date *</label>
          <input type="date" name="event_date" required/>
        </div>
        <div class="form-group">
          <label>Event Time</label>
          <input type="time" name="event_time"/>
        </div>
        <div class="form-group" style="grid-column:1/-1">
          <label>Venue / Location</label>
          <input type="text" name="venue" placeholder="Hall name or address"/>
        </div>
        <div class="form-group">
          <label>Approx. Boys Count</label>
          <input type="number" name="budget" step="1" min="1" placeholder="e.g. 15"/>
        </div>
      </div>

      <div style="font-family:'Playfair Display',serif;font-size:1rem;color:var(--teal);margin:22px 0 16px;padding-bottom:10px;border-bottom:1px solid var(--border)">
        Special Requirements
      </div>
      <div class="form-group">
        <label>Dietary Requirements</label>
        <textarea name="dietary_requirements" rows="2" placeholder="Jain, vegan, no nuts..."></textarea>
      </div>
      <div class="form-group">
        <label>Notes / Message</label>
        <textarea name="message" rows="3" placeholder="Any additional details about the event..."></textarea>
      </div>

      <button type="submit" class="btn btn-teal" style="width:100%;justify-content:center;padding:13px;margin-top:8px">
        <i class="fas fa-paper-plane"></i> Submit Booking
      </button>
    </form>
  </div>
</div>
{% endblock %}
