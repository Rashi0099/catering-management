{% extends 'admin/custom_base.html' %}
{% block title %}Edit Staff — Catrin Boys Admin{% endblock %}
{% block page_title %}Edit Staff: {{ member.full_name }}{% endblock %}

{% block content %}

<div style="max-width:640px">
  <a href="{% url 'admin_staff_detail' pk=member.pk %}" class="btn btn-ghost" style="margin-bottom:24px">
    <i class="fas fa-arrow-left"></i> Back to Staff Profile
  </a>

  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">Edit Staff Details</div>
    </div>
    <form method="post">
      {% csrf_token %}
      
      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" name="full_name" required value="{{ member.full_name }}"/>
      </div>

      <div class="responsive-grid cols-2" style="gap:16px">
        <div class="form-group">
          <label>Level *</label>
          <select name="level" required>
            <option value="C" {% if member.level == 'C' %}selected{% endif %}>C Level</option>
            <option value="B" {% if member.level == 'B' %}selected{% endif %}>B Level</option>
            <option value="A" {% if member.level == 'A' %}selected{% endif %}>A Level</option>
            <option value="captain" {% if member.level == 'captain' %}selected{% endif %}>Captain</option>
          </select>
        </div>
        <div class="form-group">
          <label>Daily Rate (₹) *</label>
          <input type="number" name="daily_rate" required step="1" value="{{ member.daily_rate|stringformat:"i" }}"/>
        </div>
      </div>

      <div class="responsive-grid cols-2" style="gap:16px">
        <div class="form-group">
          <label>Phone Number 1</label>
          <input type="text" name="phone" value="{{ member.phone }}"/>
        </div>
        <div class="form-group">
          <label>Phone Number 2</label>
          <input type="text" name="phone_2" value="{{ member.phone_2 }}"/>
        </div>
      </div>

      <div class="responsive-grid cols-2" style="gap:16px">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="email" value="{{ member.email }}"/>
        </div>
        <div class="form-group">
          <label>Age</label>
          <input type="number" name="age" value="{{ member.age|default:'' }}"/>
        </div>
      </div>

      <div class="responsive-grid cols-2" style="gap:16px">
        <div class="form-group">
          <label>Height</label>
          <input type="text" name="height" value="{{ member.height }}"/>
        </div>
        <div class="form-group">
          <label>Blood Group</label>
          <input type="text" name="blood_group" value="{{ member.blood_group }}"/>
        </div>
      </div>

      <div class="responsive-grid cols-2" style="gap:16px">
        <div class="form-group">
          <label>Guardian Name</label>
          <input type="text" name="guardian_name" value="{{ member.guardian_name }}"/>
        </div>
        <div class="form-group">
          <label>Guardian Phone</label>
          <input type="text" name="guardian_phone" value="{{ member.guardian_phone }}"/>
        </div>
      </div>

      <div class="responsive-grid cols-2" style="gap:16px">
        <div class="form-group">
          <label>Main Locality *</label>
          <select name="main_locality" required>
            <option value="" disabled {% if not member.main_locality %}selected{% endif %}>Select primary area</option>
            <option value="Kondotty" {% if member.main_locality == 'Kondotty' %}selected{% endif %}>Kondotty</option>
            <option value="Areekode" {% if member.main_locality == 'Areekode' %}selected{% endif %}>Areekode</option>
            <option value="Edavannappara" {% if member.main_locality == 'Edavannappara' %}selected{% endif %}>Edavannappara</option>
            <option value="Kizhisseri" {% if member.main_locality == 'Kizhisseri' %}selected{% endif %}>Kizhisseri</option>
            <option value="University" {% if member.main_locality == 'University' %}selected{% endif %}>University</option>
            <option value="Valluvambram" {% if member.main_locality == 'Valluvambram' %}selected{% endif %}>Valluvambram</option>
          </select>
        </div>
        <div class="form-group">
          <label>Specific Place / City</label>
          <input type="text" name="place" value="{{ member.place }}" placeholder="e.g. exact town details"/>
        </div>
      </div>

      <div class="responsive-grid cols-2" style="gap:16px">
        <div class="form-group">
          <label>Education</label>
          <input type="text" name="education" value="{{ member.education }}"/>
        </div>
        <div class="form-group">
          <label>Aadhar Card No.</label>
          <input type="text" name="aadhar" value="{{ member.aadhar_card_no }}"/>
        </div>
      </div>

      <div class="form-group">
        <label style="display:inline-flex; align-items:center; gap:8px;">
          <input type="checkbox" name="is_active" {% if member.is_active %}checked{% endif %}/>
          Is Active (Able to login)
        </label>
      </div>

      <button type="submit" class="btn btn-gold" style="width:100%;justify-content:center;margin-top:20px">
        <i class="fas fa-save"></i> Save Changes
      </button>
    </form>
  </div>
</div>

{% endblock %}
