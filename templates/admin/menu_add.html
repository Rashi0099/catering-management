{% extends 'admin/custom_base.html' %}
{% block title %}Add Menu Item — Mastan Catering & Services{% endblock %}
{% block page_title %}Add Menu Item{% endblock %}

{% block content %}

<div style="max-width:640px">
  <a href="{% url 'admin_menu' %}" class="btn btn-ghost" style="margin-bottom:24px">
    <i class="fas fa-arrow-left"></i> Back to Menu
  </a>

  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">New Menu Item</div>
    </div>
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="form-group">
        <label>Category *</label>
        <select name="category" style="margin-bottom:8px" onchange="document.getElementById('new_cat_input').style.display = this.value === '' ? 'block' : 'none'; document.getElementById('new_cat_input').required = this.value === '';">
          <option value="">+ Create New Category</option>
          {% for cat in categories %}
          <option value="{{ cat.pk }}">{{ cat.icon }} {{ cat.name }}</option>
          {% endfor %}
        </select>
        <input type="text" id="new_cat_input" name="new_category" placeholder="Enter new category name" required>

      </div>
      <div class="form-group">
        <label>Dish Name *</label>
        <input type="text" name="name" required placeholder="e.g. Chicken Biryani"/>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea name="description" rows="3" placeholder="Describe the dish..."></textarea>
      </div>
      
      <div class="form-group">
        <label>Dish Image</label>
        <input type="file" name="image" accept="image/*" style="padding:8px" />
      </div>


      <button type="submit" class="btn btn-gold" style="width:100%;justify-content:center">
        <i class="fas fa-plus"></i> Add to Menu
      </button>
    </form>
  </div>
</div>

{% endblock %}
