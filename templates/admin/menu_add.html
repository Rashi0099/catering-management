{% extends 'admin/custom_base.html' %}
{% block title %}Add Menu Item — Mastan's Catering & Services{% endblock %}
{% block page_title %}Add Menu Item{% endblock %}

{% block content %}

<div style="max-width:640px">
  <a href="{% url 'admin_menu' %}" class="btn btn-ghost" style="margin-bottom:24px">
    <i class="fas fa-arrow-left"></i> Back to Menu
  </a>

  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">New Menu Item</div>
    </div>
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="form-group">
        <label>Category *</label>
        <select name="category" required style="margin-bottom:8px" onchange="this.nextElementSibling.style.display = this.value === '' ? 'block' : 'none'">
          <option value="">+ Create New Category</option>
          {% for cat in categories %}
          <option value="{{ cat.pk }}">{{ cat.icon }} {{ cat.name }}</option>
          {% endfor %}
        </select>
        <input type="text" name="new_category" placeholder="Enter new category name">
      </div>
      <div class="responsive-grid cols-2" style="gap:16px">
        <div class="form-group">
          <label>Dish Name *</label>
          <input type="text" name="name" required placeholder="e.g. Chicken Biryani"/>
        </div>
        <div class="form-group">
          <label>Price (₹) *</label>
          <input type="number" name="price" required step="0.01" placeholder="e.g. 299"/>
        </div>
      </div>
      <div class="form-group">
        <label>Description *</label>
        <textarea name="description" required rows="3" placeholder="Describe the dish..."></textarea>
      </div>
      
      <div class="form-group">
        <label>Dish Image</label>
        <input type="file" name="image" accept="image/*" style="padding:8px" />
      </div>

      <div style="display:flex;gap:20px;flex-wrap:wrap;align-items:center;margin-bottom:20px">
        <label style="display:flex;align-items:center;gap:8px;text-transform:none;font-size:0.88rem;cursor:pointer">
          <input type="checkbox" name="is_vegetarian" style="width:auto;padding:0"/> Veg
        </label>
        <label style="display:flex;align-items:center;gap:8px;text-transform:none;font-size:0.88rem;cursor:pointer">
          <input type="checkbox" name="is_vegan" style="width:auto;padding:0"/> Vegan
        </label>
        <label style="display:flex;align-items:center;gap:8px;text-transform:none;font-size:0.88rem;cursor:pointer">
          <input type="checkbox" name="is_gluten_free" style="width:auto;padding:0"/> Gluten Free
        </label>
        <label style="display:flex;align-items:center;gap:8px;text-transform:none;font-size:0.88rem;cursor:pointer">
          <input type="checkbox" name="is_featured" style="width:auto;padding:0"/> Featured
        </label>
        <label style="display:flex;align-items:center;gap:8px;text-transform:none;font-size:0.88rem;cursor:pointer">
          <input type="checkbox" name="is_available" checked style="width:auto;padding:0"/> Available
        </label>
      </div>
      <button type="submit" class="btn btn-gold" style="width:100%;justify-content:center">
        <i class="fas fa-plus"></i> Add to Menu
      </button>
    </form>
  </div>
</div>

{% endblock %}
