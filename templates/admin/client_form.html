{% extends 'admin/custom_base.html' %}

{% block title %}Client | Admin Panel{% endblock %}
{% block page_title %}
<a href="{% url 'admin_client_list' %}" class="back-link" style="color:var(--text); margin-right:12px; text-decoration:none;"><i class="fas fa-arrow-left"></i></a>
{% if item %}Edit Client{% else %}Add Client{% endif %}
{% endblock %}

{% block content %}
<div class="panel" style="max-width:500px">
  <div class="panel-header">
    <div class="panel-title">{% if item %}Edit Client{% else %}Add Client{% endif %}</div>
  </div>
  <form method="POST">
    {% csrf_token %}
    <div class="form-group full" style="margin-bottom: 20px;">
      <label>Client Name / Company</label>
      <input type="text" name="name" value="{{ item.name|default:'' }}" required placeholder="e.g. Flora Events">
    </div>
    <div class="form-group full">
      <label>Contact Phone</label>
      <input type="text" name="phone" value="{{ item.phone|default:'' }}" placeholder="e.g. 9876543210" pattern="[0-9]*" title="Only numbers">
    </div>
    
    <button type="submit" class="btn btn-gold" style="margin-top:20px;">
      <i class="fas fa-save"></i> Save Client
    </button>
    <a href="{% url 'admin_client_list' %}" class="btn btn-ghost" style="margin-top:20px;">Cancel</a>
  </form>
</div>
{% endblock %}
