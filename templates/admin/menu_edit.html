{% extends 'admin/custom_base.html' %}
{% block title %}Edit Menu Item — Mastan Catering & Services{% endblock %}
{% block page_title %}Edit Menu Item{% endblock %}

{% block content %}
<div style="max-width:640px">
  <a href="{% url 'admin_menu' %}" class="btn btn-ghost" style="margin-bottom:24px">
    <i class="fas fa-arrow-left"></i> Back to Menu
  </a>

  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">Edit {{ item.name }}</div>
    </div>
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="form-group">
        <label>Category *</label>
        <select name="category" style="margin-bottom:8px" onchange="document.getElementById('new_cat_input_edit').style.display = this.value === '' ? 'block' : 'none'; document.getElementById('new_cat_input_edit').required = this.value === '';">
          <option value="">+ Create New Category</option>
          {% for cat in categories %}
          <option value="{{ cat.pk }}" {% if item.category_id == cat.pk %}selected{% endif %}>{{ cat.icon }} {{ cat.name }}</option>
          {% endfor %}
        </select>
        <input type="text" id="new_cat_input_edit" name="new_category" placeholder="Enter new category name" style="display:none;">
      </div>
      <div class="form-group">
        <label>Dish Name *</label>
        <input type="text" name="name" value="{{ item.name }}" required />
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea name="description" rows="3">{{ item.description }}</textarea>
      </div>
      
      <div class="form-group">
        <label>Dish Image</label>
        {% if item.image %}
          <div style="margin-bottom:10px;">
            <img src="{{ item.image.url }}" alt="{{ item.name }}" style="height:80px; width:80px; object-fit:cover; border-radius:8px;">
            <label style="display:inline-flex; align-items:center; gap:8px; margin-left:15px; cursor:pointer; text-transform:none; font-size:0.85rem;">
              <input type="checkbox" name="clear_image"> Remove image
            </label>
          </div>
        {% endif %}
        <input type="file" name="image" accept="image/*" style="padding:8px" />
      </div>


      <button type="submit" class="btn btn-gold" style="width:100%;justify-content:center">
        <i class="fas fa-save"></i> Save Changes
      </button>
    </form>
  </div>
</div>
{% endblock %}
