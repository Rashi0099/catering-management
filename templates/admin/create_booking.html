{% extends 'admin/custom_base.html' %}
{% block title %}Create Booking — Mastan's Catering & Services Admin{% endblock %}
{% block page_title %}New Manual Booking{% endblock %}

{% block content %}

<div style="max-width:800px">
  <a href="{% url 'admin_bookings' %}" class="btn btn-ghost" style="margin-bottom:24px">
    <i class="fas fa-arrow-left"></i> Back to Bookings
  </a>

  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">Client &amp; Event Details</div>
    </div>
    <form method="post">
      {% csrf_token %}
      
      <div class="responsive-grid cols-2" style="gap:16px;margin-bottom:20px">
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" name="name" placeholder="Client Name"/>
        </div>
        <div class="form-group">
          <label>Phone Number *</label>
          <input type="text" name="phone" placeholder="e.g. 9876543210"/>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="email" placeholder="client@example.com"/>
        </div>
        <div class="form-group">
          <label>Company/Org (Optional)</label>
          <input type="text" name="company" placeholder="Corporate Name"/>
        </div>
      </div>

      <div style="border-top:1px solid var(--border);padding-top:20px;margin-bottom:20px">
        <div class="panel-title" style="margin-bottom:16px;font-size:0.9rem">Event Specifications</div>
        
        <div class="responsive-grid cols-2" style="gap:16px;margin-bottom:16px">
          <div class="form-group">
            <label>Event Type *</label>
            <select name="event_type" style="margin-bottom:12px;">
              <option value="wedding">Wedding / Reception</option>
              <option value="corporate">Corporate Event</option>
              <option value="party">Private Party / Birthday</option>
              <option value="other">Other</option>
            </select>
            <label>Event Session *</label>
            <select name="session">
              <option value="day">Day</option>
              <option value="night">Night</option>
            </select>
          </div>
          <div class="form-group">
            <label>Event Date *</label>
            <input type="date" name="event_date"/>
          </div>
          <div class="form-group">
            <label>Guest Count *</label>
            <input type="number" name="guest_count" value="50"/>
          </div>
        </div>

        <div class="responsive-grid cols-2" style="gap:16px;margin-bottom:16px">
          <div class="form-group">
            <label>Event Time</label>
            <input type="time" name="event_time"/>
          </div>
          <div class="form-group">
            <label>Expected Budget (₹)</label>
            <input type="number" name="budget" step="100" placeholder="e.g. 150000"/>
          </div>
        </div>

        <div class="form-group">
          <label>Venue Approximations</label>
          <input type="text" name="venue" placeholder="Full address or Venue Name"/>
        </div>
        <div class="responsive-grid cols-2" style="gap:16px;margin-bottom:16px">
          <div class="form-group">
            <label>Map Location Name (Visible to Staff)</label>
            <input type="text" name="location_name" placeholder="e.g. Flora Auditorium"/>
          </div>
          <div class="form-group">
            <label>Map Link URL (Visible to Staff)</label>
            <input type="url" name="location_link" placeholder="https://maps.app.goo.gl/..."/>
          </div>
        </div>
        
        <div class="form-group" style="padding-top: 15px; border-top:1px solid rgba(212,168,82,0.2); margin-top:5px; margin-bottom: 20px;">
          <label style="display:flex; align-items:flex-start; gap:10px; cursor:pointer;">
            <input type="checkbox" name="is_long_work" style="width:18px;height:18px;cursor:pointer;accent-color:var(--gold); margin-top:2px;">
            <div>
              <strong style="color:var(--text);">Mark as "Long Work" Distance</strong><br>
              <span style="font-size:0.85rem;color:var(--muted);font-weight:normal;">Check this if the venue is >20km from the main office. This directly triggers dynamic staff promotion logic.</span>
            </div>
          </label>
        </div>
        <div class="form-group">
          <label>Dietary Requirements &amp; Special Requests</label>
          <textarea name="dietary_requirements" rows="2" placeholder="e.g. 20 veg meals, 5 vegan..."></textarea>
        </div>
        <div class="form-group">
          <label>Additional Notes</label>
          <textarea name="message" rows="2" placeholder="Internal admin notes or specific client requests..."></textarea>
        </div>
        <div class="form-group" style="padding-top: 10px;">
          <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
            <input type="checkbox" name="allow_direct_join" style="width:18px;height:18px;cursor:pointer;">
            <strong>Enable Direct Join</strong>
            <span style="font-size:0.85rem;color:var(--muted);font-weight:normal;">(Staff can join without admin approval)</span>
          </label>
        </div>
      </div>

      <button type="submit" class="btn btn-gold" style="width:100%;justify-content:center;margin-top:10px;padding:12px">
        <i class="fas fa-calendar-check"></i> Submit &amp; Confirm Booking
      </button>
    </form>
  </div>
</div>

{% endblock %}
