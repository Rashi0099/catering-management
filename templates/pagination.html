{% if page_obj.has_other_pages %}
<div style="display: flex; justify-content: center; gap: 8px; margin-top: 24px; padding-bottom: 24px;">
    {% if page_obj.has_previous %}
        <a href="?page={{ page_obj.previous_page_number }}{% if search %}&search={{ search }}{% endif %}{% if status_filter %}&status={{ status_filter }}{% endif %}" class="btn btn-ghost" style="padding: 6px 12px;">&laquo; Prev</a>
    {% endif %}

    <span style="padding: 6px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.85rem;">
        Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}
    </span>

    {% if page_obj.has_next %}
        <a href="?page={{ page_obj.next_page_number }}{% if search %}&search={{ search }}{% endif %}{% if status_filter %}&status={{ status_filter }}{% endif %}" class="btn btn-ghost" style="padding: 6px 12px;">Next &raquo;</a>
    {% endif %}
</div>
{% endif %}
