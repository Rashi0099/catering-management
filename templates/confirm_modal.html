<!-- Global Confirm Modal -->
<div id="custom-confirm-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:9999; align-items:center; justify-content:center; backdrop-filter:blur(3px);">
    <div style="background:var(--bg, #fff); border:1px solid var(--border, #eee); border-radius:16px; padding:28px 24px; max-width:380px; width:90%; text-align:center; box-shadow:0 10px 40px rgba(0,0,0,0.25); animation: popIn 0.2s ease-out;">
        <i class="fas fa-exclamation-triangle" style="font-size:3.5rem; color:var(--gold, #dfb15b); margin-bottom:18px;"></i>
        <h3 style="margin-bottom:12px; font-weight:700; color:var(--text, #333); font-size:1.3rem;">Please Confirm</h3>
        <p id="custom-confirm-message" style="margin-bottom:28px; color:var(--muted, #666); font-size:0.95rem; line-height:1.5;"></p>
        <div style="display:flex; justify-content:center; gap:12px;">
            <button id="custom-confirm-cancel" class="btn" style="background:transparent; border:1px solid var(--border, #ccc); color:var(--muted, #666); padding:8px 20px; border-radius:8px; cursor:pointer; font-weight:500;">Cancel</button>
            <button id="custom-confirm-ok" class="btn" style="background:var(--gold, #dfb15b); color:#fff; border:none; padding:8px 20px; border-radius:8px; cursor:pointer; font-weight:500; box-shadow:0 4px 10px rgba(223,177,91,0.3);">Confirm</button>
        </div>
    </div>
</div>

<style>
@keyframes popIn {
    0% { transform: scale(0.9); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}
</style>

<script>
window.customConfirmFn = function(message, callback) {
    const modal = document.getElementById('custom-confirm-modal');
    document.getElementById('custom-confirm-message').innerText = message;
    modal.style.display = 'flex';
    
    // Clear previous listeners by replacing the nodelist
    const okBtn = document.getElementById('custom-confirm-ok');
    const cancelBtn = document.getElementById('custom-confirm-cancel');
    
    const newOkBtn = okBtn.cloneNode(true);
    okBtn.parentNode.replaceChild(newOkBtn, okBtn);
    
    const newCancelBtn = cancelBtn.cloneNode(true);
    cancelBtn.parentNode.replaceChild(newCancelBtn, cancelBtn);
    
    newOkBtn.addEventListener('click', function() {
        modal.style.display = 'none';
        callback(true);
    });
    
    newCancelBtn.addEventListener('click', function() {
        modal.style.display = 'none';
        callback(false);
    });
};

function handleCustomConfirm(element, message, event) {
    if (element.getAttribute('data-confirmed') === 'true') {
        return true; 
    }
    event.preventDefault();
    
    window.customConfirmFn(message, function(confirmed) {
        if (confirmed) {
            element.setAttribute('data-confirmed', 'true');
            if (element.tagName === 'A') {
                window.location.href = element.href;
            } else if (element.tagName === 'FORM' || element.closest('form')) {
                const form = element.tagName === 'FORM' ? element : element.closest('form');
                form.submit();
            } else {
                element.click();
            }
        }
    });
    
    return false;
}
</script>
