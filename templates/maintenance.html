<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex, nofollow"/>
  <title>We'll Be Back Soon — Mastan Catering</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="icon" type="image/png" href="{% static 'icons/icon-192x192.png' %}">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:    #c8940a;
      --gold-dk: #a67c08;
      --gold-lt: #e6aa20;
      --brown:   #3d1c02;
      --bg:      #eaddd1;
    }

    html, body {
      height: 100%;
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      overflow: hidden;
    }

    /* ── Background layers ── */
    .bg-layer {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 30%, rgba(200,148,10,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 70%, rgba(61,28,2,0.10) 0%, transparent 55%),
        #eaddd1;
    }

    /* ── Floating orbs ── */
    .orb {
      position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .orb-1 {
      width: 420px; height: 420px;
      top: -120px; left: -100px;
      background: radial-gradient(circle, rgba(200,148,10,0.14) 0%, transparent 70%);
      animation-duration: 14s;
    }
    .orb-2 {
      width: 320px; height: 320px;
      bottom: -80px; right: -60px;
      background: radial-gradient(circle, rgba(61,28,2,0.09) 0%, transparent 70%);
      animation-duration: 10s; animation-delay: -4s;
    }
    .orb-3 {
      width: 200px; height: 200px;
      top: 55%; left: 60%;
      background: radial-gradient(circle, rgba(200,148,10,0.08) 0%, transparent 70%);
      animation-duration: 16s; animation-delay: -8s;
    }
    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, -20px) scale(1.07); }
    }

    /* ── Main card ── */
    .container {
      position: relative; z-index: 10;
      height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(200,148,10,0.18);
      border-radius: 28px;
      padding: 60px 64px;
      max-width: 560px; width: 100%;
      text-align: center;
      box-shadow: 0 32px 80px rgba(61,28,2,0.1), 0 0 0 1px rgba(200,148,10,0.06);
      animation: fadeUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Logo / Icon ── */
    .logo-wrap {
      width: 80px; height: 80px; margin: 0 auto 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold-lt), var(--gold-dk));
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem;
      box-shadow: 0 8px 30px rgba(200,148,10,0.4), 0 0 0 8px rgba(200,148,10,0.08);
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 8px 30px rgba(200,148,10,0.4), 0 0 0 8px rgba(200,148,10,0.08); }
      50%       { box-shadow: 0 8px 40px rgba(200,148,10,0.55), 0 0 0 14px rgba(200,148,10,0.05); }
    }

    /* ── Typography ── */
    .tag {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--gold);
      margin-bottom: 14px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .tag::before, .tag::after {
      content: ''; display: block;
      width: 28px; height: 1.5px; background: var(--gold); opacity: 0.45;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 5vw, 2.8rem);
      color: var(--brown); line-height: 1.18;
      margin-bottom: 8px;
    }
    h1 em { font-style: italic; color: var(--gold); }

    .divider {
      width: 44px; height: 2.5px;
      background: linear-gradient(90deg, var(--gold-dk), var(--gold-lt));
      margin: 20px auto; border-radius: 2px;
    }

    .subtitle {
      font-size: 1rem; color: #7a6a5a; line-height: 1.75;
      margin-bottom: 36px;
    }

    /* ── Progress bar ── */
    .progress-wrap {
      background: rgba(61,28,2,0.07);
      border-radius: 99px; height: 6px;
      overflow: hidden; margin-bottom: 36px;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--gold-dk), var(--gold-lt));
      border-radius: 99px;
      animation: shimmer 2.4s ease-in-out infinite;
      width: 60%;
    }
    @keyframes shimmer {
      0%   { width: 30%; opacity: 0.8; }
      50%  { width: 75%; opacity: 1; }
      100% { width: 30%; opacity: 0.8; }
    }

    /* ── Contact chips ── */
    .chips {
      display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
      margin-bottom: 28px;
    }
    .chip {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 9px 18px; border-radius: 99px;
      border: 1px solid rgba(200,148,10,0.28);
      background: rgba(200,148,10,0.05);
      color: var(--brown); font-size: 0.84rem; font-weight: 500;
      text-decoration: none;
      transition: all 0.25s;
    }
    .chip:hover {
      background: var(--gold); color: #fff; border-color: var(--gold);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(200,148,10,0.35);
    }

    /* ── Footer note ── */
    .note {
      font-size: 0.78rem; color: #a89880;
    }
    .note a { color: var(--gold); text-decoration: none; font-weight: 600; }
    .note a:hover { text-decoration: underline; }

    /* ── Dots animation ── */
    .dots span {
      display: inline-block;
      animation: blink 1.4s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; }
      40%            { opacity: 1; }
    }

    @media (max-width: 520px) {
      .card { padding: 44px 28px; }
    }
  </style>
</head>
<body>

<div class="bg-layer"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="container">
  <div class="card">

    <div class="logo-wrap">🍽️</div>

    <div class="tag">Maintenance</div>

    <h1>We'll Be Back <em>Soon</em></h1>
    <div class="divider"></div>

    <p class="subtitle">
      We're polishing things behind the scenes to serve you better.
      Our catering platform will return shortly<span class="dots"><span>.</span><span>.</span><span>.</span></span>
    </p>

    <div class="progress-wrap">
      <div class="progress-bar"></div>
    </div>

    <div class="chips">
      <a class="chip" href="tel:+919744067400">📞 +91 97440 67400</a>
      <a class="chip" href="mailto:mastanboys999@gmail.com">✉️ Email Us</a>
      <a class="chip" href="https://wa.me/918075645207" target="_blank">💬 WhatsApp</a>
    </div>

    <p class="note">
      Are you staff? <a href="/staff/login/">Login here</a> to access your portal.
    </p>

  </div>
</div>

</body>
</html>
